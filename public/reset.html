<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Шашки Рояль — сброс кэша</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #2C1810 0%, #0A0503 100%);
      color: #FFD700;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .box {
      padding: 28px 24px;
      max-width: 320px;
      border-radius: 16px;
      background: rgba(212,175,55,0.06);
      border: 1px solid rgba(212,175,55,0.25);
    }
    h1 { font-size: 22px; margin: 0 0 12px; letter-spacing: 0.08em; }
    p  { color: rgba(212,175,55,0.85); font-size: 14px; line-height: 1.5; margin: 8px 0; }
    .status {
      margin-top: 18px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(76,175,80,0.10);
      border: 1px solid rgba(76,175,80,0.35);
      color: #7ed87e;
      font-size: 13px;
      min-height: 18px;
    }
    .err {
      background: rgba(255,80,80,0.10);
      border-color: rgba(255,80,80,0.45);
      color: #ff9999;
    }
    .crown {
      font-size: 36px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="crown">♛</div>
    <h1>Сброс кэша</h1>
    <p>Очищаем локальные данные и переустанавливаем приложение…</p>
    <div id="status" class="status">⏳ Очищаем…</div>
  </div>

  <script>
    (async function () {
      var statusEl = document.getElementById('status');
      function setStatus(text, isError) {
        statusEl.textContent = text;
        statusEl.className = 'status' + (isError ? ' err' : '');
      }

      var steps = [];

      // 1) localStorage / sessionStorage
      try {
        localStorage.clear();
        steps.push('localStorage');
      } catch (e) {}
      try {
        sessionStorage.clear();
        steps.push('sessionStorage');
      } catch (e) {}

      // 2) Cookies (best-effort, нашего origin)
      try {
        document.cookie.split(';').forEach(function (c) {
          var name = c.split('=')[0].trim();
          if (name) {
            document.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/';
          }
        });
        steps.push('cookies');
      } catch (e) {}

      // 3) IndexedDB
      try {
        if (window.indexedDB && indexedDB.databases) {
          var dbs = await indexedDB.databases();
          await Promise.all(dbs.map(function (d) {
            return new Promise(function (resolve) {
              if (!d.name) return resolve();
              var req = indexedDB.deleteDatabase(d.name);
              req.onsuccess = req.onerror = req.onblocked = function () { resolve(); };
            });
          }));
          steps.push('indexedDB');
        }
      } catch (e) {}

      // 4) Cache Storage (service worker caches)
      try {
        if ('caches' in window) {
          var keys = await caches.keys();
          await Promise.all(keys.map(function (k) { return caches.delete(k); }));
          steps.push('caches(' + keys.length + ')');
        }
      } catch (e) {}

      // 5) Service Workers
      try {
        if ('serviceWorker' in navigator) {
          var regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(function (r) { return r.unregister(); }));
          steps.push('SW(' + regs.length + ')');
        }
      } catch (e) {}

      setStatus('✓ Готово: ' + steps.join(', '));

      // 6) Hard reload → home (network, no SW interception)
      setTimeout(function () {
        // Bust HTTP cache by adding a unique query param
        var bust = '/?fresh=' + Date.now();
        window.location.replace(bust);
      }, 1200);
    })().catch(function (e) {
      document.getElementById('status').className = 'status err';
      document.getElementById('status').textContent =
        '✕ Ошибка: ' + (e && e.message ? e.message : e) + '. Очисти данные сайта вручную через настройки браузера.';
    });
  </script>
</body>
</html>
