name: Deploy to Cloudflare Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    # Avoid duplicate runs on android-only changes
    paths-ignore:
      - "android/**"
      - "docs/**"
      - "release/**"
      - "*.md"

concurrency:
  # Cancel an in-flight deploy if a newer push lands on main
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Build frontend (Vite)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 pages deploy dist \
            --project-name=shashki-royale \
            --branch=main \
            --commit-hash=${{ github.sha }} \
            --commit-message="$(git log -1 --pretty=format:'%s' | head -c 120)"
